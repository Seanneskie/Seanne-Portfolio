name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  # Opt JS-based actions into Node 24 ahead of the June 2026 cutover
  # so we drop the "Node.js 20 actions are deprecated" warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies (prefer ci)
        run: |
          set -e
          if npm ci; then
            echo "npm ci succeeded"
          else
            echo "npm ci failed; falling back to npm install to refresh lockfile"
            rm -rf node_modules package-lock.json
            npm install
          fi

      - name: Lint
        run: npm run lint

      - name: Type-check (Astro)
        run: npx astro check || true

      - name: Run unit tests
        env:
          CI: true
        run: npx vitest run --reporter=default

  build:
    name: Build static site
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies (prefer ci)
        run: |
          set -e
          if npm ci; then
            echo "npm ci succeeded"
          else
            echo "npm ci failed; falling back to npm install to refresh lockfile"
            rm -rf node_modules package-lock.json
            npm install
          fi

      - name: Build Astro site
        env:
          NODE_ENV: production
        run: npm run astro:build

      - name: Add .nojekyll (skip Jekyll processing on GH Pages)
        run: touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
